<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent PoC - 实时输出验证</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #fff; margin-bottom: 8px; font-size: 24px; }
    .subtitle { color: #858585; margin-bottom: 24px; font-size: 14px; }
    .panel {
      background: #252526;
      border: 1px solid #3d3d3d;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    label { font-size: 13px; color: #b0b0b0; min-width: 60px; }
    select, input[type="text"] {
      background: #3c3c3c;
      border: 1px solid #555;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      flex: 1;
      min-width: 200px;
    }
    input[type="text"] { flex: 2; }
    .btn-group { display: flex; gap: 10px; }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #0e639c; color: #fff; }
    .btn-danger { background: #c75450; color: #fff; }
    .btn-secondary { background: #3c3c3c; color: #fff; border: 1px solid #555; }
    .status-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-idle { background: #858585; }
    .status-running { background: #73c991; animation: pulse 1s infinite; }
    .status-error { background: #f14c4c; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .log-container {
      background: #1e1e1e;
      border: 1px solid #3d3d3d;
      border-radius: 4px;
      height: 500px;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-line {
      padding: 1px 0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line:hover { background: rgba(255,255,255,0.03); }
    .log-timestamp { color: #6e7681; margin-right: 8px; }
    .log-event-start { color: #73c991; font-weight: bold; }
    .log-event-end { color: #73c991; font-weight: bold; }
    .log-event-error { color: #f14c4c; }
    .log-event-output { color: #d4d4d4; }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #6e7681;
      font-style: italic;
    }
    .quick-prompts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      background: #2d2d30;
      border: 1px solid #3e3e42;
      color: #ccc;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .chip:hover { background: #3e3e42; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Agent PoC - 最小可行性验证</h1>
    <p class="subtitle">验证链路：平台启动 Agent 进程 → 实时捕获输出 → SSE 推送到前端</p>

    <div class="panel">
      <div class="form-row">
        <label>Agent</label>
        <select id="agentType">
          <option value="claude">Claude Code (--bare -p)</option>
          <option value="opencode">OpenCode (run)</option>
        </select>
        <label>工作目录</label>
        <input type="text" id="workspace" value="C:\Users\51554\code\ai-dev-platform" />
      </div>
      <div class="form-row">
        <label>Prompt</label>
        <input type="text" id="prompt" value="Count how many .java files are in src/main/java/com/aidev, use Bash tool" />
      </div>
      <div class="quick-prompts">
        <span class="chip" onclick="setPrompt('List the top 5 largest files in this project')">📁 列出大文件</span>
        <span class="chip" onclick="setPrompt('What does the Workflow class do? Read it and summarize')">📖 解释 Workflow</span>
        <span class="chip" onclick="setPrompt('Find all TODO comments in the codebase')">🔍 查找 TODO</span>
        <span class="chip" onclick="setPrompt('Count lines of code in src/main and src/test')">📊 统计代码量</span>
      </div>
      <div class="form-row" style="margin-top: 16px;">
        <div class="btn-group">
          <button class="btn-primary" id="btnStart" onclick="startAgent()">▶ 启动 Agent</button>
          <button class="btn-danger" id="btnStop" onclick="stopAgent()" disabled>⏹ 终止</button>
          <button class="btn-secondary" onclick="clearLogs()">🗑 清空</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="status-bar">
        <span><span class="status-dot status-idle" id="statusDot"></span> <span id="statusText">空闲</span></span>
        <span style="color:#6e7681">|</span>
        <span id="lineCount">0 行输出</span>
        <span style="color:#6e7681">|</span>
        <span id="timeElapsed">耗时: 0s</span>
      </div>
      <div class="log-container" id="logContainer">
        <div class="empty-state">点击 "启动 Agent" 开始验证...</div>
      </div>
    </div>
  </div>

  <script>
    let eventSource = null;
    let startTime = null;
    let lineCount = 0;
    let timerInterval = null;

    function setPrompt(text) {
      document.getElementById('prompt').value = text;
    }

    function startAgent() {
      if (eventSource) return;

      const agentType = document.getElementById('agentType').value;
      const prompt = document.getElementById('prompt').value;
      const workspace = document.getElementById('workspace').value;

      clearLogs();
      setRunning(true);
      startTime = Date.now();
      lineCount = 0;
      timerInterval = setInterval(updateTimer, 1000);

      // 构建 SSE URL（通过 Vite dev server 代理到后端）
      const params = new URLSearchParams({ agentType, prompt, workspace });
      const url = `/api/poc/agent-stream?${params}`;

      logEvent('system', `连接 SSE: ${url}`);
      logEvent('system', `Agent: ${agentType}, Prompt: ${prompt}`);

      eventSource = new EventSource(url);

      eventSource.addEventListener('start', (e) => {
        logEvent('start', e.data);
      });

      eventSource.addEventListener('output', (e) => {
        logEvent('output', e.data);
        lineCount++;
        document.getElementById('lineCount').textContent = `${lineCount} 行输出`;
      });

      eventSource.addEventListener('end', (e) => {
        logEvent('end', e.data);
        cleanup();
      });

      eventSource.addEventListener('error', (e) => {
        if (e.data) {
          logEvent('error', e.data);
        } else {
          logEvent('error', 'SSE 连接错误（Agent 可能已结束或网络断开）');
        }
        cleanup();
      });

      eventSource.onmessage = (e) => {
        // 默认消息（无 event name）
        logEvent('output', e.data);
      };

      eventSource.onerror = (e) => {
        if (eventSource.readyState === EventSource.CLOSED) {
          logEvent('system', 'SSE 连接已关闭');
          cleanup();
        }
      };
    }

    function stopAgent() {
      if (eventSource) {
        eventSource.close();
        logEvent('system', '用户手动终止');
        cleanup();
      }
    }

    function cleanup() {
      setRunning(false);
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function setRunning(running) {
      document.getElementById('btnStart').disabled = running;
      document.getElementById('btnStop').disabled = !running;
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (running) {
        dot.className = 'status-dot status-running';
        text.textContent = '运行中...';
      } else {
        dot.className = 'status-dot status-idle';
        text.textContent = '空闲';
      }
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timeElapsed').textContent = `耗时: ${elapsed}s`;
    }

    function clearLogs() {
      document.getElementById('logContainer').innerHTML = '<div class="empty-state">等待输出...</div>';
      lineCount = 0;
      document.getElementById('lineCount').textContent = '0 行输出';
      document.getElementById('timeElapsed').textContent = '耗时: 0s';
    }

    function logEvent(type, message) {
      const container = document.getElementById('logContainer');
      if (container.querySelector('.empty-state')) {
        container.innerHTML = '';
      }

      const now = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = 'log-line';

      let typeClass = 'log-event-output';
      let typeLabel = '';
      switch (type) {
        case 'start': typeClass = 'log-event-start'; typeLabel = '[START]'; break;
        case 'end': typeClass = 'log-event-end'; typeLabel = '[END]'; break;
        case 'error': typeClass = 'log-event-error'; typeLabel = '[ERROR]'; break;
        case 'system': typeLabel = '[SYS]'; break;
        default: typeLabel = '';
      }

      div.innerHTML = `<span class="log-timestamp">${now}</span><span class="${typeClass}">${typeLabel} ${escapeHtml(message)}</span>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
